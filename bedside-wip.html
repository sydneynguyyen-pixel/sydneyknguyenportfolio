<style>
  :root {
    --font-sans: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-hand: 'Mynerve', 'Manrope', cursive;
    --ink: #1a1a1a;
    --ink-soft: #555;
    --ink-faint: #888;
    --accent: #a5583f;
    --accent-light: #f4e7e1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-sans);
    color: var(--ink);
    background-color: #f0efea;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 769px) { .menubar, .menubar-sub { display: none !important; } }

  /* ── "In progress" content — vertical rhythm mirrors the Figma mockup:
     the flowers + headline cluster sits near the vertical centre, and the
     "for now… / visit devpost" group drops into the lower third. Flexible
     spacers hold those proportions on any viewport height. ── */
  .wip {
    flex: 1;
    min-height: calc(100vh - 60px);   /* fill the viewport below the in-flow nav */
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 24px;
  }
  .wip-spacer { width: 100%; }
  .wip-spacer-top { flex: 2.9 1 0; }
  .wip-spacer-mid { flex: 1.5 1 0; }
  .wip-spacer-bot { flex: 1 1 0; }
  .wip-top, .wip-bottom { flex: 0 0 auto; }
  .wip-flowers {
    width: 128px; height: auto; display: block;
    margin: 0 auto 20px;
    opacity: 0.92;
  }
  .wip-title {
    font-family: var(--font-sans);
    font-size: clamp(26px, 4.2vw, 37px);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.2;
    color: var(--ink);
    text-wrap: balance;
  }
  .wip-hand {
    font-family: var(--font-hand);
    font-size: clamp(21px, 2.6vw, 26px);
    font-weight: 400;
    color: var(--ink);
    margin-top: 12px;
  }

  .wip-fornow {
    font-family: var(--font-sans);
    font-size: 16px; font-weight: 400; color: var(--ink);
    margin-bottom: 16px;
  }
  .wip-btn {
    display: inline-flex; align-items: center; gap: 9px;
    background: var(--ink); color: #fff;
    border: 1.5px solid var(--ink);
    font-family: var(--font-sans); font-size: 15px; font-weight: 500;
    text-decoration: none; padding: 14px 26px; border-radius: 999px;
    transition: background 0.18s ease, color 0.18s ease;
  }
  .wip-btn:hover { background: #fff; color: var(--ink); }
  .wip-btn .wip-arrow { font-size: 15px; line-height: 1; }
  .wip-btns { display: inline-flex; flex-wrap: wrap; justify-content: center; gap: 12px; }

  /* ── Menubar (mobile bar only) ── */
  .menubar {
    position: fixed; top: 0; left: 0; width: 100%; height: 58px;
    backdrop-filter: blur(18px) saturate(1.6); -webkit-backdrop-filter: blur(18px) saturate(1.6);
    background: linear-gradient(-45deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0) 65%), rgba(255,255,255,0.6);
    border-bottom: 1px solid rgba(255,255,255,0.55);
    display: flex; align-items: center; padding: 0 17px; z-index: 1000;
  }
  .menubar-home { display: flex; align-items: center; text-decoration: none; color: #1a1a1a; }
  .menubar-apple { width: 32px; height: 33px; object-fit: contain; flex-shrink: 0; }
  .menubar-title { font-weight: 500; font-size: 20px; color: #1a1a1a; margin-left: 22px; white-space: nowrap; }
  .menubar-sub { position: fixed; left: 253px; top: 18px; font-weight: 400; font-size: 16px; color: #696967; white-space: nowrap; z-index: 1001; }

  /* ── Cursor ── */
  * { cursor: none !important; }
  .cursor-dot {
    width: 9px; height: 9px;
    background: linear-gradient(-45deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0) 65%), rgba(165,88,63,0.55);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(165,88,63,0.5); box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999999;
    transform: translate(-50%,-50%); transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1); will-change: left, top;
  }
  body.cursor-hover .cursor-dot { transform: translate(-50%,-50%) scale(1.35); }
  body.cursor-click .cursor-dot { transform: translate(-50%,-50%) scale(0.75); background: rgba(165,88,63,0.82); }
  .cursor-sparkle { position: fixed; pointer-events: none; z-index: 99999; user-select: none; line-height: 1; animation: sparkle-pop 600ms ease-out forwards; }
  @keyframes sparkle-pop {
    0%   { opacity: 1; transform: scale(0.4) translate(0,0) rotate(0deg); }
    50%  { opacity: 0.9; transform: scale(1.2) translate(calc(var(--tx)*0.6),calc(var(--ty)*0.6)) rotate(120deg); }
    100% { opacity: 0; transform: scale(0.1) translate(var(--tx),var(--ty)) rotate(360deg); }
  }

  /* ── Mobile drawer ── */
  .mob-hamburger { display: none; }
  .mob-drawer-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 199; backdrop-filter: blur(2px); }
  .mob-drawer-backdrop.open { display: block; }
  .mob-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 280px; background: #faf9f6; z-index: 200; transform: translateX(100%); transition: transform 0.28s cubic-bezier(0.32,0,0.16,1); display: flex; flex-direction: column; padding: 0 0 40px; box-shadow: -4px 0 32px rgba(0,0,0,0.12); }
  .mob-drawer.open { transform: translateX(0); }
  .mob-drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid rgba(0,0,0,0.07); }
  .mob-drawer-identity { display: flex; align-items: center; gap: 11px; }
  .mob-drawer-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .mob-drawer-name { font-size: 13.5px; font-weight: 600; color: #1a1a1a; margin-bottom: 1px; }
  .mob-drawer-role { font-size: 11.5px; color: #999; }
  .mob-drawer-close { width: 32px; height: 32px; border-radius: 8px; background: rgba(0,0,0,0.06); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #555; flex-shrink: 0; }
  .mob-drawer-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; padding: 20px 20px 8px; }
  .mob-drawer-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
  .mob-drawer-link { display: flex; align-items: center; gap: 12px; padding: 13px 10px; border-radius: 12px; font-size: 14px; font-weight: 500; color: #1a1a1a; text-decoration: none; transition: background 0.15s; }
  .mob-drawer-link svg { color: #888; flex-shrink: 0; }
  .mob-drawer-link:hover { background: rgba(0,0,0,0.05); }
  .mob-drawer-contact { display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
  .mob-drawer-contact-link { display: flex; align-items: center; gap: 12px; padding: 12px 10px; border-radius: 12px; font-size: 13px; font-weight: 400; color: #555; text-decoration: none; transition: background 0.15s; }
  .mob-drawer-contact-link svg { flex-shrink: 0; color: #bbb; }
  .mob-drawer-contact-link:hover { background: rgba(0,0,0,0.05); color: #1a1a1a; }
  @media (max-width: 768px) {
    body { padding-top: 70px; }
    .wip { padding: 32px 22px 64px; }
    .wip-bottom { margin-top: clamp(72px, 14vh, 140px); }
    .mob-hamburger { display: flex; flex-direction: column; justify-content: center; gap: 5px; width: 36px; height: 36px; padding: 8px; background: none; border: none; outline: none; cursor: pointer; border-radius: 8px; margin-left: auto; flex-shrink: 0; -webkit-appearance: none; appearance: none; }
    .mob-hamburger span { display: block; height: 2px; background: #1a1a1a; border-radius: 2px; }
    .menubar-sub { display: none !important; }
    * { cursor: auto !important; }
    .cursor-dot { display: none !important; }
  }

  @media (prefers-reduced-motion: reduce) {
    .wip-btn { transition: none; }
  }
</style>
</head>

<script>
  (function() {
    const dot = document.getElementById('cursor-dot');
    if (!dot) return;
    document.addEventListener('mousemove', e => { dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px'; });
    const SEL = 'a, button, [onclick]';
    document.addEventListener('mouseover', e => { if (e.target.closest(SEL)) document.body.classList.add('cursor-hover'); });
    document.addEventListener('mouseout',  e => { if (e.target.closest(SEL)) document.body.classList.remove('cursor-hover'); });
    document.addEventListener('mousedown', () => document.body.classList.add('cursor-click'));
    document.addEventListener('mouseup',   () => document.body.classList.remove('cursor-click'));
  })();

  (function() {
    const COLORS = ['#f4e7e1','#e8c9b8','#d9a488','#c98a6a','#a5583f','#e5b299','#cf9a7a'];
    const SHAPES = ['✦','✧','★','◆','✿','⬥','✺','⟡'];
    let lastTime = 0;
    document.addEventListener('mousemove', e => {
      const now = Date.now();
      if (now - lastTime < 30) return;
      lastTime = now;
      if (Math.random() > 0.55) return;
      const el = document.createElement('span');
      el.className = 'cursor-sparkle';
      el.textContent = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      const tx = (Math.random() - 0.5) * 36, ty = -(Math.random() * 28 + 10);
      const size = Math.random() * 14 + 9, dur = Math.random() * 300 + 500;
      el.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;color:${COLORS[Math.floor(Math.random()*COLORS.length)]};font-size:${size}px;--tx:${tx}px;--ty:${ty}px;animation-duration:${dur}ms;`;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove(), { once: true });
    });
  })();

  function mobDrawerOpen() {
    document.getElementById('mobDrawer').classList.add('open');
    document.getElementById('mobBackdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function mobDrawerClose() {
    document.getElementById('mobDrawer').classList.remove('open');
    document.getElementById('mobBackdrop').classList.remove('open');
    document.body.style.overflow = '';
  }
</script>
